name: Build and Deploy React App

on:
  push:
    branches:
      - main # Change if your main branch is named differently
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Force actions to Node 24

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      CI: false

    steps:
      # 1️Checkout the repo with full history
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Ensures Azure deployment works

      # 2️Setup Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24" # Use Node.js 24 explicitly

      # 3️Install dependencies
      - name: Install Dependencies
        run: npm install

      # 4️Build the React app
      - name: Build React App
        run: npm run build

      # 5 Clean git extraheader to avoid git config errors
      - name: Clean git extraheader
        run: git config --remove-section http.https://github.com/.extraheader || true

      # 6️Deploy to Azure Static Web App
      - name: Deploy to Azure
        id: builddeploy
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/" # Root folder of your app
          api_location: "" # Api source code path - optional
          output_location: "build" # React build output folder
          github_id_token: ${{ steps.idtoken.outputs.result }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
